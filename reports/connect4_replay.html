<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Battle Arena — 🔴 Connect Four Replay</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
<link rel="stylesheet" href="nav.css?v=7"><script defer src="nav.js?v=38"></script>
<link rel="stylesheet" href="replay.css?v=11">
<style>
  .stage{grid-template-columns:minmax(300px,420px) 1fr;}
  @media (max-width:860px){ .stage{grid-template-columns:1fr;} }

  .colhint{display:grid; margin:0 9px 6px;}
  .colhint div{text-align:center; font-size:11px; color:var(--dim);}
  .cabinet{padding:8px; background:var(--faint); border:1px solid var(--line);}
  .board{display:grid; width:100%;}
  .cell{aspect-ratio:1/1; position:relative; display:grid; place-items:center;
    box-shadow:inset 0 0 0 .5px var(--line);}
  .cell.colhi{background:var(--line);}
  .cell .piece{width:78%; aspect-ratio:1/1; border-radius:50%;}
  .cell .piece.p0{background:#1c1c1c;}
  .cell .piece.p1{background:#fff; box-shadow:inset 0 0 0 1px #1c1c1c;}
  .cell.last .piece{box-shadow:0 0 0 2px var(--link);}
  .cell.last .piece.p1{box-shadow:inset 0 0 0 1px #1c1c1c, 0 0 0 2px var(--link);}
  .cell.win .piece{animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 2px var(--amber);} 50%{box-shadow:0 0 0 4px var(--amber);}}
  @keyframes drop{0%{transform:translateY(-380px);opacity:.2;} 70%{transform:translateY(8px);} 100%{transform:translateY(0);opacity:1;}}
  .cell .piece.fall{animation:drop .42s cubic-bezier(.45,.05,.3,1);}

  .disc{width:16px; height:16px; border-radius:50%; display:inline-block; flex:none;}
  .disc.p0{background:#1c1c1c;}
  .disc.p1{background:#fff; box-shadow:inset 0 0 0 1px #1c1c1c;}
  .drops{color:var(--dim); font-size:13px;}
  .colchip{font-weight:700; color:var(--fg); background:var(--faint); border:1px solid var(--line); padding:1px 9px; font-size:13px;}
  .mv .d.p0{background:#1c1c1c;}
  .mv .d.p1{background:#fff; box-shadow:inset 0 0 0 1px #1c1c1c;}
</style>
</head>
<body>
<div class="wrap">
  <h1>$ ~/aibattle/connect4/replay<span class="cursor"></span></h1>
  <div class="sub">🔴 Connect Four · step through any game move by move — <b>show reasoning</b>
    reveals the model's full chain-of-thought for that move.</div>

  <div class="selectors">
    <div><label class="sel">⭐ Featured</label><select id="featSel"></select></div>
  </div>
  <details class="browse"><summary class="sel" style="cursor:pointer">… or browse every matchup</summary>
    <div class="selectors" style="margin-top:8px">
      <div><label class="sel">Matchup</label><select id="pairSel"></select></div>
      <div><label class="sel">Game</label><select id="epSel"></select></div>
    </div>
  </details>

  <div class="scoreboard" id="legendWrap">
    <div id="legend" style="display:contents"></div>
    <div id="result" style="margin-left:auto"></div>
  </div>

  <div class="stage">
    <div>
      <div class="colhint" id="colhint"></div>
      <div class="cabinet"><div class="board" id="board"></div></div>
      <div class="deck">
        <div class="deckrow">
          <button class="btn" id="first" title="Back to start">⏮</button>
          <button class="btn step" id="prev" title="Previous move (←)">◀ Prev</button>
          <button class="btn step" id="next" title="Next move (→)">Next ▶</button>
          <button class="btn primary" id="play" title="Auto-play / pause (space)">▶ Play</button>
          <button class="btn" id="speed" title="Playback speed">⏩ 1×</button>
        </div>
        <div class="scrub">
          <input type="range" id="slider" min="0" value="0">
          <span class="movecount" id="movecount"></span>
        </div>
        <div class="tip">← / → step · space play/pause</div>
      </div>
    </div>
    <div class="panel">
      <div class="arena-head"><h2>move analysis</h2></div>
      <div class="pbody" id="panel"></div>
    </div>
  </div>
  <div class="summary">
    <div class="arena-head"><h2>action summary</h2><span class="arena-tag">click to jump</span></div>
    <div class="movelist" id="movelist"></div>
  </div>
</div>

<script>
const BASE = "replays/connect4/";
const PARAMS = new URLSearchParams(location.search);
const PLAY_MS = 850;
const SPEEDS = [1, 2, 4];
const DISPLAY = {"glm-5p1":"GLM-5.1","glm-5p2":"GLM-5.2","kimi-k2p6":"Kimi K2.6",
  "minimax-m2p7":"MiniMax-M2.7","minimax-m3":"MiniMax-M3","deepseek-v4-pro":"DeepSeek V4 Pro",
  "qwen3p7-plus":"Qwen3.7 Plus","gpt-oss-120b":"GPT-OSS 120B","gpt-5.4":"GPT 5.4",
  "gpt-5.5":"GPT 5.5","claude-opus-4.8":"Claude Opus 4.8","claude-sonnet-4.6":"Claude Sonnet 4.6"};
function slug(m){ return (m||"").replace(/-coached$/,""); }
function disp(m){ return DISPLAY[slug(m)] || slug(m) || m; }
let manifest=null, featured=[], pairData=null, ep=null, cursor=0, playing=false, timer=null, showThink=false, showInput=false, speedIdx=0;

const $ = id => document.getElementById(id);

async function init() {
  try {
    manifest = await (await fetch(BASE + "manifest.json?v=17")).json();
  } catch (e) {
    $("panel").innerHTML = "<div class='invalid'>Could not load replay data.</div>" +
      "<div class='hint'>Expected <code>" + BASE + "manifest.json</code>. Run " +
      "<code>python3 scripts/build_replays.py</code> and serve the repo root.</div>";
    return;
  }
  $("pairSel").innerHTML = manifest.pairs.map((p,i) =>
    `<option value="${i}">${disp(p.a)} vs ${disp(p.b)}</option>`).join("");
  try { featured = (await (await fetch("connect4_featured.json?v=1")).json()).featured || []; } catch(e){ featured=[]; }
  $("featSel").innerHTML = featured.map((f,i)=>`<option value="${i}">${f.label}</option>`).join("") || `<option value="-1">(none)</option>`;
  $("featSel").onchange = () => loadFeatured(+$("featSel").value);
  $("pairSel").onchange = () => loadPair(+$("pairSel").value);
  $("epSel").onchange = () => selectEp(+$("epSel").value);
  $("first").onclick = () => { stop(); cursor=0; render(); };
  $("prev").onclick  = () => { stop(); if (cursor>0){cursor--; render();} };
  $("next").onclick  = () => { stop(); step(1); };
  $("play").onclick  = togglePlay;
  $("speed").onclick = cycleSpeed;
  $("slider").oninput = () => { stop(); cursor=+$("slider").value; render(); };
  document.addEventListener("keydown", e => {
    if (!ep) return;
    if (e.key === "ArrowLeft")  { stop(); if (cursor>0){cursor--; render();} e.preventDefault(); }
    if (e.key === "ArrowRight") { stop(); step(1); e.preventDefault(); }
    if (e.key === " ")          { togglePlay(); e.preventDefault(); }
  });
  // column hover highlight on the cabinet
  $("board").addEventListener("mousemove", e => {
    const cell=e.target.closest(".cell"); colHighlight(cell ? cell.dataset.col : null);
  });
  $("board").addEventListener("mouseleave", () => colHighlight(null));
  const _pp = PARAMS.get("pair");
  if (_pp || PARAMS.has("pairIndex")) {
    let pi = 0;
    if (_pp){ const f = manifest.pairs.findIndex(p => p.file===_pp || `${p.a}__vs__${p.b}`===_pp); if(f>=0)pi=f; }
    else pi = Math.max(0, Math.min(manifest.pairs.length-1, +PARAMS.get("pairIndex")||0));
    await loadPair(pi);
  } else if (featured.length) { await loadFeatured(Math.max(0, Math.min(featured.length - 1, (+(PARAMS.get("feat")) || 0)))); }
  else { await loadPair(0); }
}

async function loadFeatured(i){
  const f = featured[i]; if(!f) return;
  $("featSel").value = String(i);
  let idx = manifest.pairs.findIndex(p => p.file===f.pair || `${p.a}__vs__${p.b}`===f.pair);
  if (idx < 0) { console.warn("featured pair not built:", f.pair); return; }
  await loadPair(idx);
  const ei = pairData.episodes.findIndex(e => String(e.episode)===String(f.ep));
  if (ei>=0) selectEp(ei);
}


function colHighlight(col){
  for (const c of $("board").children)
    c.classList.toggle("colhi", col!==null && c.dataset.col===col);
}

async function loadPair(i) {
  const p = manifest.pairs[i];
  pairData = await (await fetch(BASE + p.file + "?v=17")).json();
  $("epSel").innerHTML = pairData.episodes.map((e,idx) => {
    const r = e.reason==="win" ? `${disp(e.winner_name)} wins` : (e.reason||"");
    return `<option value="${idx}">#${e.episode+1} · ${e.length} plies · ${r}</option>`;
  }).join("");
  selectEp(0);
}

function selectEp(idx) {
  stop();
  ep = pairData.episodes[idx];
  cursor = 0;
  $("slider").max = ep.moves.length;
  renderLegend();
  renderResult();
  render();
}

function seatColor(player){ return player==="player_0" ? "p0" : "p1"; }

function renderLegend() {
  const sa = ep.seat_assignment;
  $("legend").innerHTML =
    `<div class="team t0"><span class="dot"></span><div>` +
      `<div class="role">Black · first seat</div><div class="tname">${disp(sa.player_0)}</div></div></div>` +
    `<div class="vs">VS</div>` +
    `<div class="team t1"><span class="dot"></span><div>` +
      `<div class="role">White</div><div class="tname">${disp(sa.player_1)}</div></div></div>`;
  const hints=[]; for (let c=0;c<pairData.cols;c++) hints.push(`<div>${c}</div>`);
  $("colhint").innerHTML = hints.join("");
  $("colhint").style.gridTemplateColumns = `repeat(${pairData.cols}, 1fr)`;
}

function renderResult() {
  const w = disp(ep.winner_name);
  $("result").innerHTML = w ? `<span class="badge win">🏆 ${w}</span>` : "";
}

// reconstruct board after `cursor` moves; returns {grid, last:[r,c], cells}
// Start from the seeded opening position, NOT an empty grid — this variant
// pre-places one piece per player before play.
function buildGrid(n) {
  const R=pairData.rows, C=pairData.cols;
  const grid = ep.init ? ep.init.map(row => row.slice())
                       : Array.from({length:R}, ()=>Array(C).fill(null));
  let last=null;
  for (let i=0;i<n;i++){
    const m=ep.moves[i];
    if (m.col==null || m.col<0 || m.col>=C) continue;
    for (let r=R-1;r>=0;r--){ if(grid[r][m.col]===null){ grid[r][m.col]=m.player; last=[r,m.col]; break; } }
  }
  return {grid, last, R, C};
}

// winning four through the final position (winner's color)
function winningCells() {
  if (cursor!==ep.moves.length || !ep.winner_name) return [];
  const winSeat = Object.keys(ep.seat_assignment)
    .find(k => ep.seat_assignment[k]===ep.winner_name);
  const {grid,R,C}=buildGrid(ep.moves.length);
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for (let r=0;r<R;r++) for (let c=0;c<C;c++){
    if (grid[r][c]!==winSeat) continue;
    for (const [dr,dc] of dirs){
      const cells=[[r,c]];
      for (let k=1;k<4;k++){ const nr=r+dr*k, nc=c+dc*k;
        if (nr<0||nr>=R||nc<0||nc>=C||grid[nr][nc]!==winSeat) break; cells.push([nr,nc]); }
      if (cells.length===4) return cells;
    }
  }
  return [];
}

function render(animateLast=false) {
  const {grid,last,R,C}=buildGrid(cursor);
  const wins=winningCells();
  const winKey=new Set(wins.map(([r,c])=>r+","+c));
  const b=$("board");
  b.style.gridTemplateColumns=`repeat(${C}, 1fr)`;
  let html="";
  for (let r=0;r<R;r++) for (let c=0;c<C;c++){
    const v=grid[r][c];
    const isLast = last && last[0]===r && last[1]===c;
    const cls = "cell" + (isLast?" last":"") + (winKey.has(r+","+c)?" win":"");
    const piece = v ? `<div class="piece ${seatColor(v)}${animateLast&&isLast?" fall":""}"></div>` : "";
    html += `<div class="${cls}" data-col="${c}">${piece}</div>`;
  }
  b.innerHTML=html;
  $("slider").value=cursor;
  $("movecount").textContent=`move ${cursor} / ${ep.moves.length}`;
  $("prev").disabled = cursor===0;
  $("next").disabled = cursor===ep.moves.length;
  renderPanel();
  renderMoveList();
}

function jump(k){ stop(); cursor=k; render(); }

function renderMoveList(){
  const ml=$("movelist");
  ml.innerHTML = ep.moves.map((m,i)=>{
    const cur = cursor===i+1 ? " cur" : "";
    const tr = m.trunc ? " trunc" : "";
    return `<button class="mv${cur}${tr}" onclick="jump(${i+1})"><span class="n">${i+1}</span>` +
      `<span class="d ${seatColor(m.player)}"></span>col ${m.col}${m.trunc?" ⚠":""}</button>`;
  }).join("");
  const c=ml.querySelector(".cur");
  if(c){ const cr=c.getBoundingClientRect(), mr=ml.getBoundingClientRect();
    if(cr.top<mr.top) ml.scrollTop-=mr.top-cr.top;
    else if(cr.bottom>mr.bottom) ml.scrollTop+=cr.bottom-mr.bottom; }
}

function renderPanel() {
  const p=$("panel");
  if (cursor===0){
    p.innerHTML =
      `<div class="movenum">Opening</div>` +
      `<div class="meta">${disp(ep.seat_assignment.player_0)} = black · ${disp(ep.seat_assignment.player_1)} = white<br>` +
      `The board is seeded with one opening piece per player before play begins.</div>` +
      `<div class="hint">Use “Next ▶” / → or press Play to watch the game unfold.</div>`;
    return;
  }
  const m=ep.moves[cursor-1];
  const sc = seatColor(m.player);
  const color = sc==="p0" ? "black" : "white";
  const lat = m.latency_ms ? `${(m.latency_ms/1000).toFixed(1)}s` : "—";
  const inv = m.invalid ? ` · <span class="invalid">⚠ invalid → fallback</span>` : "";
  const tid = "think-"+cursor;
  const iid = "input-"+cursor;
  const warn = m.trunc
    ? `<div class="warn">⚠ <div><b>Reasoning truncated.</b> This move hit the token limit mid-thought, ` +
      `so the played move may be arbitrary rather than the model's intended choice.</div></div>` : "";
  p.innerHTML =
    `<div class="movenum"><b>${cursor}</b><span class="tot">/ ${ep.moves.length}</span></div>` +
    `<div class="actor"><span class="who"><span class="disc ${sc}"></span>${disp(m.agent)}</span></div>` +
    `<div class="actor"><span class="drops">drops into</span> <span class="colchip">col ${m.col}</span></div>` +
    `<div class="meta">${color} · ply ${m.ply} · ⏱ ${lat} thinking${inv}</div>` +
    warn +
    (m.prompt ? `<button class="thinkbtn" onclick="toggleInput(this,'${iid}')">${showInput?"🙈 Hide":"📥 Show"} input</button>` + `<pre class="think ${showInput?"":"hidden"}" id="${iid}">${escapeHtml(m.prompt)}</pre>` : "") +
    (m.thinking
      ? `<button class="thinkbtn" onclick="toggleThink(this,'${tid}')">${showThink?"🙈 Hide":"💭 Show"} reasoning</button>` +
        (m.tokens!=null ? `<span class="toktag">🧮 ${m.tokens.toLocaleString()} tokens</span>` : "") +
        `<pre class="think ${showThink?"":"hidden"}" id="${tid}">${escapeHtml(m.thinking)}</pre>`
      : `<div class="hint">No reasoning recorded for this move.</div>`);
}

function toggleThink(btn, id){
  showThink = !showThink;
  const el=$(id); if(el) el.classList.toggle("hidden");
  if(btn) btn.textContent = (showThink?"🙈 Hide":"💭 Show") + " reasoning";
}

function toggleInput(btn, id){
  showInput = !showInput;
  const el=$(id); if(el) el.classList.toggle("hidden");
  if(btn) btn.textContent = (showInput?"🙈 Hide":"📥 Show") + " input";
}

function step(d){
  const n=ep.moves.length;
  if (cursor+d<0||cursor+d>n) return;
  cursor+=d; render(d>0);
  if (cursor===n) stop();
}
function togglePlay(){ playing ? stop() : start(); }
function start(){
  if (cursor>=ep.moves.length) cursor=0;
  playing=true; $("play").textContent="⏸ Pause";
  timer=setInterval(()=>step(1), PLAY_MS / SPEEDS[speedIdx]);
}
function stop(){ playing=false; $("play").textContent="▶ Play"; if(timer){clearInterval(timer); timer=null;} }
function cycleSpeed(){
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  $("speed").textContent = "⏩ " + SPEEDS[speedIdx] + "×";
  if (playing){ clearInterval(timer); timer=setInterval(()=>step(1), PLAY_MS / SPEEDS[speedIdx]); }
}

function escapeHtml(s){ return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

init();
</script>
</body></html>
