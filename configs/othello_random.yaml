# Othello-lite 6x6 smoke: random vs random. No API needed.
game:
  name: othello_lite_6x6
  version: "1.0.0"
  params: {}

players:
  player_0:
    agent: { type: builtin, name: board_random }
  player_1:
    agent: { type: builtin, name: board_random }

run:
  episodes: 20
  seed: 12345
  seat_swap: true
  on_invalid_action: fallback
  max_concurrency: 16

output:
  dir: ./runs/othello_random
  save_full_log: true
  save_summary: true
  save_trajectories: true
  save_transcripts: true
