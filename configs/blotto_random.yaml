# Repeated Colonel Blotto smoke: random vs random. No API needed.
game:
  name: repeated_colonel_blotto
  version: "1.0.0"
  params: {}

players:
  player_0:
    agent: { type: builtin, name: blotto_random }
  player_1:
    agent: { type: builtin, name: blotto_random }

run:
  episodes: 30
  seed: 12345
  seat_swap: true
  on_invalid_action: fallback
  max_concurrency: 16

output:
  dir: ./runs/blotto_random
  save_full_log: true
  save_summary: true
  save_trajectories: true
  save_transcripts: true
