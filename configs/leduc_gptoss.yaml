# Leduc Poker correctness check: gpt-oss-120b (Fireworks) self-play.
game:
  name: leduc_poker
  version: "1.0.0"
  params: {}

players:
  player_0:
    agent:
      type: model
      name: gpt-oss-120b
      model:
        provider: fireworks
        model_id: accounts/fireworks/models/gpt-oss-120b
        api_key_env: FIREWORKS_API_KEY
        temperature: 0.0
        max_tokens: 4096
      max_retries: 2
  player_1:
    agent: { type: builtin, name: leduc_random }

run:
  episodes: 10
  seed: 7
  seat_swap: true
  on_invalid_action: fallback
  max_concurrency: 4

output:
  dir: ./runs/leduc_gptoss
  save_full_log: true
  save_summary: true
  save_trajectories: true
  save_transcripts: true
