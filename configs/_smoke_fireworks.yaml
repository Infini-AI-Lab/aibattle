# Smoke test: gpt-oss-120b (Fireworks) vs Kuhn heuristic, just 2 episodes.
game:
  name: kuhn_poker
  version: "1.0.0"
  params: {}

players:
  player_0:
    agent:
      type: model
      name: gpt-oss-120b
      model:
        provider: fireworks
        model_id: accounts/fireworks/models/gpt-oss-120b
        api_key_env: FIREWORKS_API_KEY
        temperature: 0.0
        max_tokens: 16384
      max_retries: 2
  player_1:
    agent:
      type: builtin
      name: kuhn_heuristic

run:
  episodes: 2
  seed: 7
  seat_swap: true
  on_invalid_action: fallback
  max_concurrency: 4

output:
  dir: ./runs/_smoke_fireworks
  save_full_log: true
  save_summary: true
  save_trajectories: false
  save_transcripts: false
